<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - DCA Car Rentals</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --accent: #f59e0b; --bg: #070a0f; --bg2: #0d1117; --card: rgba(255,255,255,0.05); --card-border: rgba(255,255,255,0.08); --text: #f0f4f8; --text2: #8892a4; --red: #ef4444; --green: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(245,158,11,0.08) 0%, transparent 60%); pointer-events: none; }
        .login-card { background: var(--bg2); border: 1px solid var(--card-border); border-radius: 24px; padding: 3rem; width: 100%; max-width: 420px; position: relative; }
        .admin-badge { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 4px 16px; border-radius: 20px; font-size: 0.72rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--accent); }
        .logo p { color: var(--text2); font-size: 0.875rem; margin-top: 4px; }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; margin-bottom: 0.4rem; font-size: 0.8rem; font-weight: 500; color: var(--text2); }
        .form-control { width: 100%; padding: 0.75rem 1rem; border-radius: 10px; border: 1.5px solid var(--card-border); background: rgba(255,255,255,0.04); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.925rem; transition: all 0.2s; outline: none; }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,158,11,0.1); }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 0.875rem; border-radius: 10px; border: none; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: #fbbf24; }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
        .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--red); padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.875rem; margin-bottom: 1rem; display: none; }
        .demo-box { background: rgba(245,158,11,0.06); border: 1px solid rgba(245,158,11,0.15); border-radius: 10px; padding: 0.875rem 1rem; margin-top: 1.25rem; font-size: 0.8rem; color: var(--text2); }
        .demo-box strong { color: var(--text); }
        .back-link { display: block; text-align: center; margin-top: 1.25rem; color: var(--text2); font-size: 0.875rem; text-decoration: none; }
        .back-link:hover { color: var(--accent); }
        .security-icons { display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem; color: var(--text2); font-size: 0.75rem; }
        .security-icons i { color: var(--green); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="admin-badge">ADMIN PORTAL</div>
        <div class="logo">
            <h1><i class="fas fa-shield-alt"></i> DCA Car Rentals</h1>
            <p>Secure Administrator Access</p>
        </div>
        <div class="error-msg" id="error-msg"></div>
        <div class="form-group">
            <label class="form-label">Admin Email</label>
            <input type="email" class="form-control" id="email" placeholder="admin@dcacarrentals.com" autocomplete="username">
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="btn btn-primary" onclick="doLogin()" id="login-btn">
            <i class="fas fa-sign-in-alt"></i> Access Admin Panel
        </button>
        <div class="demo-box">
    
        </div>
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Main Site</a>
        <div class="security-icons">
            <span><i class="fas fa-lock"></i> SSL Secured</span>
            <span><i class="fas fa-shield-alt"></i> Protected</span>
            <span><i class="fas fa-eye-slash"></i> Private</span>
        </div>
    </div>

    <script>
    async function doLogin() {
        const btn = document.getElementById('login-btn');
        const errEl = document.getElementById('error-msg');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
        errEl.style.display = 'none';

        const res = await fetch('/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
        });
        const data = await res.json();
        if (data.success) {
            btn.innerHTML = '<i class="fas fa-check"></i> Access Granted!';
            setTimeout(() => window.location.href = data.redirect, 800);
        } else {
            errEl.textContent = data.message || 'Invalid credentials';
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Access Admin Panel';
        }
    }
    </script>
</body>
</html>
