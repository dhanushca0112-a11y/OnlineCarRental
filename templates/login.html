{% extends "base.html" %}
{% block title %}Login - DCA Car Rentals{% endblock %}
{% block content %}
<style>
.auth-wrap { min-height: calc(100vh - 68px); display: flex; align-items: center; justify-content: center; padding: 2rem; background: radial-gradient(ellipse at 50% 50%, rgba(245,158,11,0.05) 0%, transparent 70%); }
.auth-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 24px; padding: 2.5rem; width: 100%; max-width: 440px; backdrop-filter: blur(20px); box-shadow: var(--shadow); }
.auth-logo { text-align: center; margin-bottom: 2rem; }
.auth-logo h1 { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--accent); }
.auth-logo p { color: var(--text2); font-size: 0.875rem; margin-top: 4px; }
.divider { display: flex; align-items: center; gap: 1rem; margin: 1.25rem 0; color: var(--text2); font-size: 0.8rem; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--card-border); }
.social-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 0.75rem; border-radius: 10px; border: 1.5px solid var(--card-border); background: transparent; color: var(--text); cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; text-decoration: none; }
.social-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-logo">
            <h1><i class="fas fa-car"></i> DCA Car Rentals</h1>
            <p>Sign in to your account</p>
        </div>
        <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:0.5rem;" onclick="doLogin()" id="login-btn">
            <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
        <div class="divider">or</div>
        <div style="text-align:center;font-size:0.875rem;color:var(--text2);">
            Don't have an account? <a href="/register" style="color:var(--accent);font-weight:600;">Register Free</a>
        </div>
        <div style="margin-top:1rem;padding:1rem;background:var(--bg3);border-radius:10px;font-size:0.8rem;color:var(--text2);">
        </div>
    </div>
</div>
<script>
async function doLogin() {
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
    const res = await fetch('/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value }) });
    const data = await res.json();
    if (data.success) { showToast('Welcome back!', 'success'); setTimeout(() => window.location.href = data.redirect, 800); }
    else { showToast(data.message, 'error'); btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In'; }
}
</script>
{% endblock %}
